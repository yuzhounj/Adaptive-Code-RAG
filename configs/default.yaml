retriever:
  model_name: "microsoft/codebert-base"
  top_k: 3
  max_seq_len: 512
  embedding_dim: 768
  freeze_doc_encoder: false

generator:
  model: "ollama/qwen2.5-coder:7b"
  api_base: "http://localhost:11434"
  n_samples: 1
  temperature: 0.8
  max_tokens: 512
  timeout: 60
  max_concurrency: 4

reward:
  execution_timeout: 10
  relevance_model: "ollama/qwen2.5-coder:14b"
  relevance_api_base: "http://localhost:11434"
  max_concurrency: 4

rl:
  learning_rate: 5.0e-6
  batch_size: 2
  max_steps: 3000
  baseline_decay: 0.99
  entropy_coeff: 0.005
  max_grad_norm: 0.5
  warmup_steps: 150
  eval_interval: 200
  checkpoint_interval: 500
  log_interval: 100
  metrics_log_interval: 1
  index_refresh_interval: 500

data:
  cache_dir: "data/cache"
  corpus_dir: "data/corpus"
  humaneval_dir: "data/humaneval"
  codesearchnet_max_samples: 5000
  csn_eval_size: 100
  humaneval_eval_size: 200

logging:
  use_wandb: false
  use_tensorboard: true
  log_dir: "outputs/logs"
  project_name: "adaptive-code-rag"

output:
  checkpoint_dir: "outputs/checkpoints"