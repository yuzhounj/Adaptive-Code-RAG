retriever:
  model_name: "microsoft/codebert-base"
  top_k: 5
  max_seq_len: 512
  embedding_dim: 768
  index_refresh_interval: 999999 #effectively never

generator:
  model: "ollama/qwen2.5:1.5b"
  api_base: "http://localhost:11434"
  n_samples: 1
  temperature: 0.8
  max_tokens: 512
  timeout: 60

reward:
  execution_timeout: 10
  relevance_model: "ollama/qwen2.5-coder:14b"
  relevance_api_base: "http://localhost:11434"
  execution_weight: 0.5
  relevance_weight: 0.5

rl:
  learning_rate: 1.0e-5
  batch_size: 1
  max_steps: 5000
  baseline_decay: 0.99
  entropy_coeff: 0.05
  max_grad_norm: 1.0
  warmup_steps: 100
  eval_interval: 200
  checkpoint_interval: 1000
  log_interval: 10

data:
  train_split: 0.8
  cache_dir: "data/cache"
  corpus_dir: "data/corpus"
  humaneval_dir: "data/humaneval"

logging:
  use_wandb: false
  use_tensorboard: true
  log_dir: "outputs/logs"
  project_name: "adaptive-code-rag"

output:
  checkpoint_dir: "outputs/checkpoints"
